name: httpfiletools
base: core24
adopt-info: httpfiletools
summary: Generate and run HTTP request files from one CLI
description: |
  HTTP File Tools is a command-line tool written in Rust for generating and
  running HTTP request files. It combines OpenAPI-based `.http` file generation
  and `.http` request execution in one tool.

  • Generate `.http` files from OpenAPI documents
  • Run `.http` files with upstream-compatible behavior
  • Use one CLI for generation and execution workflows

title: HTTP File Tools
contact: https://github.com/christianhelle/httpfiletools/issues
issues: https://github.com/christianhelle/httpfiletools/issues
source-code: https://github.com/christianhelle/httpfiletools
website: https://github.com/christianhelle/httpfiletools
donation: https://buymeacoffee.com/christianhelle

grade: stable
confinement: strict
license: MIT

apps:
  httpfiletools:
    command: bin/httpfiletools
    plugs:
      - network
      - home

parts:
  httpfiletools:
    plugin: rust
    source: .
    override-pull: |
      craftctl default
      version="$(grep -E '^\s*version\s*=' crates/cli/Cargo.toml | head -n1 | cut -d '\"' -f2)"
      craftctl set version="$version"
    override-build: |
      cargo build --release --package httpfiletools
      install -D -m755 target/release/httpfiletools $SNAPCRAFT_PART_INSTALL/bin/httpfiletools
    build-packages:
      - libssl-dev
      - pkg-config
      - git
